# Continuous integration for the LaunchKit monorepo.
#
# Runs on every push to `main` and on every pull request that targets
# `main`. The job mirrors the local prepush chain (`lefthook.yml`):
# typecheck → lint → build → tests. The build is part of CI rather
# than an artifact step because the smoke tests in `tests/` consume
# the worker `dist/` output and would otherwise have nothing to
# exercise.
#
# Why this exists, in two sentences: the strict TypeScript flags and
# the `--max-warnings=0` lint enforcement only matter if a regression
# is caught before it lands on `main`. CI runs the same chain a
# developer runs locally, so a green PR badge means the merge is
# guaranteed to leave `main` in a typecheck/lint/build/test-clean
# state.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR when a new commit lands.
# We deliberately do *not* cancel runs on `main` — a sequential
# merge to `main` should never abort the previous merge's
# verification, even if a third merge lands seconds later. A
# cancelled green run on `main` would look like a flaky CI setup,
# which is exactly the wrong signal for a public showcase repo.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    name: typecheck · lint · build · test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Opt the JavaScript-based actions in this job (`actions/checkout`,
    # `actions/setup-node`) into the Node.js 24 runtime ahead of the
    # September 2026 deprecation of Node.js 20 on GitHub-hosted runners.
    # Without this env var, every CI run shows a yellow deprecation
    # annotation on the job summary, which is exactly the wrong signal
    # for a public showcase repo. The env var is honored by the GitHub
    # Actions runner, not by our application code.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Single-commit fetch is enough — none of the steps below
          # need history.
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Render runs the services on Node 22 LTS. CI mirrors that
          # so a passing build here is the same Node the production
          # services boot under.
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        # `tsc -b` walks the workspace project references and emits
        # the composite build artifacts that the lint and test steps
        # depend on. The dashboard `tsc --noEmit -p` runs second
        # because it does not participate in the solution build.
        run: npm run typecheck

      - name: Lint
        # `eslint . --max-warnings=0` — every rule is at error
        # severity (see PR #6) and any warning fails the job.
        run: npm run lint

      - name: Build
        # Composite tsc for web/worker/cron + Vite for the dashboard
        # SPA. The dashboard build also catches Tailwind / asset
        # resolution issues that the typecheck would not see.
        run: npm run build

      - name: Test
        # The smoke tests import compiled worker output, which is
        # why this step runs after `build`. They also rely on
        # `process.env.DATABASE_URL` and `REDIS_URL` having a value
        # before the strict env parser fires; the test file sets
        # both via `??=`, so the CI env can be left empty.
        run: npm test

  # End-to-end tests via Playwright.
  #
  # Gated on `needs: ci` so the unit/build chain has to pass
  # before we spin up the expensive services (Postgres + Redis
  # + MinIO + a live dev stack + a real Chromium browser). The
  # @smoke tagged subset runs on every PR; the @full-pipeline
  # spec only runs when the PR carries the `run-e2e-full`
  # label, because that path makes real provider calls and
  # costs real money per run.
  #
  # Secrets required (configured in the repo's GitHub Actions
  # settings):
  #
  #   ANTHROPIC_API_KEY, VOYAGE_API_KEY, FAL_API_KEY,
  #   ELEVENLABS_API_KEY, ELEVENLABS_VOICE_ID,
  #   ELEVENLABS_VOICE_ID_ALT, ELEVENLABS_MODEL_ID,
  #   WORLD_LABS_API_KEY, EXA_API_KEY
  #
  # The smoke suite only needs Anthropic + Voyage; the
  # @full-pipeline spec needs all the above. Missing secrets
  # degrade gracefully — the spec skips provider-specific
  # assertions but still exercises the core pipeline shape.
  e2e:
    name: playwright e2e
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      # Point drizzle + web + workflows at the CI Postgres
      # service. Matches the docker-compose local setup except
      # the port — GitHub Actions service containers expose on
      # 5432 (no host-port remapping needed).
      DATABASE_URL: 'postgresql://launchkit:launchkit@localhost:5432/launchkit'
      REDIS_URL: 'redis://localhost:6379'
      MINIO_ENDPOINT_HOST: 'localhost:9000'
      MINIO_ROOT_USER: 'launchkit'
      MINIO_ROOT_PASSWORD: 'launchkit-dev-password'
      MINIO_BUCKET: 'launchkit-renders'
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
      FAL_API_KEY: ${{ secrets.FAL_API_KEY }}
      ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
      ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
      ELEVENLABS_VOICE_ID_ALT: ${{ secrets.ELEVENLABS_VOICE_ID_ALT }}
      ELEVENLABS_MODEL_ID: ${{ secrets.ELEVENLABS_MODEL_ID }}
      WORLD_LABS_API_KEY: ${{ secrets.WORLD_LABS_API_KEY }}
      EXA_API_KEY: ${{ secrets.EXA_API_KEY }}

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: launchkit
          POSTGRES_USER: launchkit
          POSTGRES_PASSWORD: launchkit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U launchkit -d launchkit"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      minio:
        image: minio/minio:RELEASE.2025-01-20T14-49-07Z
        env:
          MINIO_ROOT_USER: launchkit
          MINIO_ROOT_PASSWORD: launchkit-dev-password
        ports:
          - 9000:9000
          - 9001:9001
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npm run db:migrate

      - name: Build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Start dev stack (background)
        # The `&` suffix backgrounds the process; `wait-on`
        # blocks until the dashboard + API are both responsive
        # before handing off to Playwright. `nohup` ensures the
        # background process survives even if the current shell
        # exits.
        run: |
          nohup npm run dev > dev-stack.log 2>&1 &
          echo $! > .dev-stack.pid
          npx wait-on -t 120000 http://localhost:5173 http://localhost:3000
        env:
          NODE_ENV: development

      - name: Run smoke e2e suite
        run: npm run test:e2e:smoke

      - name: Run full-pipeline suite
        if: contains(github.event.pull_request.labels.*.name, 'run-e2e-full')
        run: npm run test:e2e:full

      - name: Stop dev stack
        if: always()
        run: |
          if [ -f .dev-stack.pid ]; then
            kill $(cat .dev-stack.pid) 2>/dev/null || true
          fi

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7

      - name: Upload dev-stack logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dev-stack-logs
          path: dev-stack.log
          retention-days: 7
