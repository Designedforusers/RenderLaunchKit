services:
  - type: web
    name: launchkit-web
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: npm ci && npm run build
    preDeployCommand: npm run db:migrate
    startCommand: npm run start:web
    buildFilter:
      paths:
        - package.json
        - package-lock.json
        - drizzle.config.ts
        - render.yaml
        - migrations/**
        - packages/shared/**
        - packages/video/**
        - apps/web/**
        - apps/dashboard/**
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: launchkit-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: launchkit-redis
          type: keyvalue
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      # Base64 32-byte secret for encrypting user-supplied GitHub
      # personal access tokens on the projects row. Must match the
      # worker's copy. See `.env.example` for the generation command.
      - key: GITHUB_TOKEN_SECRET
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        sync: false
      - key: ELEVENLABS_MODEL_ID
        sync: false
      - key: API_KEY
        sync: false

  - type: worker
    name: launchkit-worker
    runtime: node
    plan: starter
    rootDir: .
    # The worker uses the Claude Agent SDK for the research agent. The
    # SDK ships a self-contained `claude` binary inside its npm package
    # (see node_modules/@anthropic-ai/claude-agent-sdk/manifest.json for
    # the per-platform checksums) — `npm ci` is enough to land it. No
    # global install or extra build step required at deploy time.
    buildCommand: npm ci && npm run build
    startCommand: npm run start:worker
    buildFilter:
      paths:
        - package.json
        - package-lock.json
        - drizzle.config.ts
        - render.yaml
        - migrations/**
        - packages/shared/**
        - packages/video/**
        - packages/asset-generators/**
        - apps/worker/**
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: launchkit-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: launchkit-redis
          type: keyvalue
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      # NOTE: this only affects the single-shot agents (writer,
      # strategist, art-director, etc.). The research agent runs
      # through the Claude Agent SDK which manages its own model
      # selection (currently hardcoded to claude-opus-4-6 in
      # apps/worker/src/lib/agent-sdk-runner.ts).
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-6
      - key: FAL_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      # World Labs (Marble) 3D world generation. Drives the
      # `world_scene` asset type — Claude drafts the prompt, the
      # worker calls Marble, polls the operation, and surfaces the
      # public viewer URL on the asset. The worker degrades gracefully
      # when the key is absent: only the world_scene branch fails,
      # the rest of the asset fan-out keeps running.
      - key: WORLD_LABS_API_KEY
        sync: false
      # Base64 32-byte secret for decrypting the per-project GitHub
      # PAT the web service stored on the projects row. Must match
      # the web service's copy exactly; a mismatch degrades every
      # private-repo analyze job to the unauthenticated path.
      - key: GITHUB_TOKEN_SECRET
        sync: false

  - type: cron
    name: launchkit-cron
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: npm ci && npm run build
    startCommand: npm run start:cron
    schedule: "0 */6 * * *"
    buildFilter:
      paths:
        - package.json
        - package-lock.json
        - drizzle.config.ts
        - render.yaml
        - migrations/**
        - packages/shared/**
        - apps/cron/**
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: launchkit-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: launchkit-redis
          type: keyvalue
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: GITHUB_TOKEN
        sync: false

  - type: keyvalue
    name: launchkit-redis
    plan: starter
    maxmemoryPolicy: noeviction

databases:
  - name: launchkit-db
    plan: starter
    postgresMajorVersion: 16
