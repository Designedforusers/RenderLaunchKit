services:
  - type: web
    name: launchkit-web
    runtime: node
    plan: pro
    healthCheckPath: /api/health
    rootDir: .
    # Plain npm build — no more Chrome headless-shell install. The
    # web service no longer renders Remotion videos locally: the
    # `/api/assets/:id/video.mp4` route dispatches to the
    # `renderRemotionVideo` task on the Render Workflows service
    # (`apps/workflows/src/tasks/render-remotion-video.ts`) and
    # 302-redirects clients to the MinIO public URL the task
    # persists on the asset row. The workflows service has its
    # own `buildCommand` that installs Chrome libs and runs
    # `npx remotion browser ensure`; that buildCommand is set on
    # the manually-created workflows service in the Render
    # dashboard because Render Workflows is not yet supported by
    # the Blueprint.
    #
    # The `packages/video/**` path stays in the buildFilter
    # because the dashboard bundle imports
    # `LaunchKitVideoPropsSchema` from `@launchkit/video` (via the
    # package's browser-safe top-level export) for client-side
    # prop validation.
    buildCommand: npm ci --include=dev && npm run build
    preDeployCommand: npm run db:migrate
    startCommand: npm run start:web
    buildFilter:
      paths:
        - package.json
        - package-lock.json
        - drizzle.config.ts
        - render.yaml
        - migrations/**
        - packages/shared/**
        - packages/video/**
        - apps/web/**
        - apps/dashboard/**
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: launchkit-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: launchkit-redis
          type: keyvalue
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      # Base64 32-byte secret for encrypting user-supplied GitHub
      # personal access tokens on the projects row. Must match the
      # worker's copy. See `.env.example` for the generation command.
      - key: GITHUB_TOKEN_SECRET
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        sync: false
      - key: ELEVENLABS_VOICE_ID_ALT
        sync: false
      - key: ELEVENLABS_MODEL_ID
        sync: false
      # Direct generation endpoints (the creative studio at
      # `/create` and the chat endpoint at `/api/projects/:id/chat`)
      # call FAL, World Labs, and Anthropic synchronously from the
      # web request handler — no BullMQ hop, no worker bounce. The
      # typed env module in `apps/web/src/env.ts` declares each as
      # optional so the service still boots without them, but the
      # matching route returns a structured 503 at call time if the
      # required key is missing. Expose them here so the creative
      # studio and chat features actually work in production.
      - key: FAL_API_KEY
        sync: false
      - key: WORLD_LABS_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      # Exa deep-search tool invoked from the chat endpoint. Chat
      # still works without it (falls back to Claude's native
      # web_search), but the dedicated deep-search tool is gated
      # on this key at request time.
      - key: EXA_API_KEY
        sync: false
      # Optional bearer-token gate for programmatic API access. Leave
      # UNSET for the demo — the React dashboard does not send auth
      # headers and will 401 on every API call if this is set. Only
      # set this when restricting access to external scripts/CLIs
      # that can pass `Authorization: Bearer <key>`.
      - key: API_KEY
        sync: false
      # Comma-separated CORS origins. Defaults to localhost when unset.
      # Set to the public Render hostname for cross-origin requests.
      - key: CORS_ORIGIN
        sync: false
      # Render Workflows trigger — the `/api/assets/:id/regenerate`
      # route calls `render.workflows.startTask` to re-fire asset
      # generation instead of enqueuing a BullMQ job. Both fields
      # are required at call time; the web service still boots
      # without them but the regen route throws a structured error
      # if either is missing.
      - key: RENDER_API_KEY
        sync: false
      - key: RENDER_WORKFLOW_SLUG
        sync: false
      # Remotion renderer service — Docker-based web service that
      # runs headless Chrome for video compositing.
      - key: RENDERER_SERVICE_URL
        sync: false
      # MinIO object storage. The web service touches MinIO in two
      # places:
      #
      #   1. `/api/assets/:id/video.mp4` READS `rendered_video_url`
      #      from the asset row and 302-redirects clients to the
      #      stored public URL.
      #   2. The narrated-video variant UPLOADS the synthesized
      #      ElevenLabs MP3 to `audio/<assetId>-<seed>.mp3` and
      #      passes the resulting public URL into `audioSrc` on
      #      the Remotion props. This keeps the Workflows task
      #      payload down to ~200 bytes instead of the ~3-5 MB
      #      data URI the earlier design inlined.
      #
      # Write path (#2) needs the root credentials, so they are
      # wired via `fromService` against `launchkit-minio` the same
      # way the workflows service reads them. The workflows service
      # itself is created manually in the dashboard because Render
      # Workflows is not yet in the Blueprint syntax — see ADR-002
      # and CLAUDE.md § "Workflows service".
      # Render's `fromService.property: host` returns the private
      # hostname which has no TLS on 443. The S3 SDK needs the
      # public hostname so HTTPS works via Render's ingress.
      - key: MINIO_ENDPOINT_HOST
        value: launchkit-minio.onrender.com
      - key: MINIO_ROOT_USER
        fromService:
          name: launchkit-minio
          type: web
          envVarKey: MINIO_ROOT_USER
      - key: MINIO_ROOT_PASSWORD
        fromService:
          name: launchkit-minio
          type: web
          envVarKey: MINIO_ROOT_PASSWORD
      - key: MINIO_BUCKET
        value: launchkit-renders

  - type: worker
    name: launchkit-worker
    runtime: node
    plan: pro
    rootDir: .
    # The worker uses the Claude Agent SDK for the research agent. The
    # SDK ships a self-contained `claude` binary inside its npm package
    # (see node_modules/@anthropic-ai/claude-agent-sdk/manifest.json for
    # the per-platform checksums) — `npm ci` is enough to land it. No
    # global install or extra build step required at deploy time.
    #
    # Python is NOT installed on this instance. The Pika video-meeting
    # integration's `join` subprocess runs on the dedicated
    # `launchkit-pika-worker` service below; this shared worker only
    # handles the pika-poll (HTTPS GET) and pika-leave (HTTPS DELETE)
    # control-plane jobs, both pure TypeScript with no Python
    # dependency.
    #
    # Note on the workflows service: Render Workflows is created via
    # the dashboard (New > Workflow) and is not defined in this
    # Blueprint. See README.md § "Create the workflow service" for
    # the one-time dashboard setup. The worker trigger helper
    # (`apps/worker/src/lib/trigger-workflow-generation.ts`) and the
    # web trigger helper (`apps/web/src/lib/trigger-workflow-generation.ts`)
    # both read `RENDER_API_KEY` and `RENDER_WORKFLOW_SLUG` from
    # their respective service env pages.
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start:worker
    buildFilter:
      paths:
        - package.json
        - package-lock.json
        - drizzle.config.ts
        - render.yaml
        - migrations/**
        - packages/shared/**
        - packages/video/**
        - packages/asset-generators/**
        - apps/worker/**
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: launchkit-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: launchkit-redis
          type: keyvalue
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      # NOTE: this only affects the single-shot agents (writer,
      # strategist, art-director, etc.). The research agent runs
      # through the Claude Agent SDK which manages its own model
      # selection (currently hardcoded to claude-opus-4-6 in
      # apps/worker/src/lib/agent-sdk-runner.ts).
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-6
      - key: FAL_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      # World Labs (Marble) 3D world generation. Drives the
      # `world_scene` asset type — Claude drafts the prompt, the
      # worker calls Marble, polls the operation, and surfaces the
      # public viewer URL on the asset. The worker degrades gracefully
      # when the key is absent: only the world_scene branch fails,
      # the rest of the asset fan-out keeps running.
      - key: WORLD_LABS_API_KEY
        sync: false
      # Pika control-plane operations (pika-poll + pika-leave)
      # run on this shared worker and hit Pika's HTTPS endpoints
      # directly — `DELETE /session/{id}` for leave, `GET
      # /session/{id}` for the 30-second health poll. Both are
      # single-HTTP-call pure-TypeScript jobs, no Python needed.
      # The avatar ref (`PIKA_AVATAR`) is NOT set here because
      # the shared worker never spawns the join subprocess —
      # that's on the dedicated launchkit-pika-worker below.
      - key: PIKA_API_KEY
        sync: false
      # Base64 32-byte secret for decrypting the per-project GitHub
      # PAT the web service stored on the projects row. Must match
      # the web service's copy exactly; a mismatch degrades every
      # private-repo analyze job to the unauthenticated path.
      - key: GITHUB_TOKEN_SECRET
        sync: false
      # Voyage AI embedding model for the self-learning loop. Drives
      # pgvector similarity clustering in feedback aggregation and
      # project-similarity search. Both are optional — the worker
      # boots without them but edit-pattern clustering and project
      # embedding skip silently.
      - key: VOYAGE_API_KEY
        sync: false
      - key: VOYAGE_MODEL
        value: voyage-3-large
      # Grok live X (Twitter) search — the only source with live
      # post data. Optional: the trending-signals agent skips the
      # Grok source when absent.
      - key: GROK_API_KEY
        sync: false
      - key: GROK_MODEL
        value: grok-4-latest
      # Exa semantic web search for niche developer content. Used by
      # the trending-signals agent and the research agent's MCP
      # server. Optional: falls back to Anthropic WebSearch.
      - key: EXA_API_KEY
        sync: false
      # Product Hunt v2 GraphQL developer token. Free to obtain at
      # https://api.producthunt.com/v2/oauth/applications. Optional:
      # the tool returns an empty array when absent.
      - key: PRODUCT_HUNT_TOKEN
        sync: false
      # Render API key used by `trigger-workflow-generation.ts` to
      # call `render.workflows.startTask` for every asset-generation
      # run. Required — every fan-out (strategize → generate, review
      # re-queue, commit-marketing refresh) now routes through the
      # workflow service. Generated from the Render dashboard
      # account settings.
      - key: RENDER_API_KEY
        sync: false
      # Slug of the workflow service that hosts the task
      # definitions, copied from the dashboard after one-time
      # creation. Required.
      - key: RENDER_WORKFLOW_SLUG
        sync: false

  # ── Pika Invite Worker ─────────────────────────────────────────────
  #
  # Dedicated single-purpose instance for the Pika video-meeting JOIN
  # flow. Every job on its `pika-invite` BullMQ queue spawns the
  # vendored Python CLI's `join` subcommand for ~90 seconds to bring
  # a Pika-hosted avatar into a live Google Meet. This is the ONLY
  # service in the LaunchKit stack that runs Python — the shared
  # worker above uses pure-TypeScript `fetch()` calls for the
  # control-plane operations (poll + leave).
  #
  # Why a dedicated instance for a single queue
  # ---------------------------------------
  #
  # Reliability for the "user clicks Invite, bot joins meeting"
  # UX demands ZERO event-loop contention with the
  # analysis/research/trending jobs that run on the shared worker.
  # A dedicated instance with a single-purpose BullMQ Worker keeps
  # click-to-subprocess-spawn latency under 100 ms regardless of
  # what other work is in flight. The instance exists to sit warm and
  # ready to `child_process.spawn('python3', ...)` the instant a
  # job arrives on Redis.
  #
  # Both entry points (`dist/index.js` and `dist/index.pika.js`)
  # are compiled from the SAME `apps/worker` workspace — they share
  # code, not deployment. The only things different between the two
  # services are the `startCommand` and the `buildCommand` (this
  # one installs Python, the shared worker does not).
  #
  # This service consumes the `pika-invite` queue ONLY. It does
  # NOT touch analysis, review, trending, or pika-control —
  # those all live on the shared `launchkit-worker` above.
  - type: worker
    name: launchkit-pika-worker
    runtime: docker
    plan: pro
    rootDir: .
    dockerfilePath: ./Dockerfile.pika-worker
    # Docker runtime gives us full OS control — apt-get installs
    # Python 3 + pip in the Dockerfile, which the Node runtime's
    # read-only filesystem blocks. The vendored Pika CLI's only
    # Python dep is `requests>=2.32.5`.
    buildFilter:
      paths:
        - package.json
        - package-lock.json
        - render.yaml
        - packages/shared/**
        - vendor/pikastream-video-meeting/**
        - apps/worker/**
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: launchkit-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: launchkit-redis
          type: keyvalue
          property: connectionString
      - key: NODE_ENV
        value: production
      # Pika Developer Key (required). The wrapper at
      # `apps/worker/src/lib/pika-stream.ts:runPikaSubprocess`
      # renames this to `PIKA_DEV_KEY` in the subprocess env at
      # spawn time so the rest of the codebase stays on our
      # standard `*_API_KEY` naming convention.
      - key: PIKA_API_KEY
        sync: false
      # Avatar reference — either an absolute container filesystem
      # path OR an https URL. For production, use a hosted URL
      # (e.g., a raw GitHub URL or an R2 public URL) since Render
      # worker containers have no stable filesystem for local
      # image files. The value is user-private and must NEVER be
      # committed to the repo. See docs/pika-integration.md §
      # "PIKA_AVATAR" for the full guidance.
      - key: PIKA_AVATAR
        sync: false

  - type: cron
    name: launchkit-cron
    runtime: node
    plan: pro
    rootDir: .
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start:cron
    schedule: "0 */6 * * *"
    buildFilter:
      paths:
        - package.json
        - package-lock.json
        - drizzle.config.ts
        - render.yaml
        - migrations/**
        - packages/shared/**
        - apps/cron/**
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: launchkit-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: launchkit-redis
          type: keyvalue
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: GITHUB_TOKEN
        sync: false
      # Optional. Used by the Phase 7 Layer 3 cluster summary upgrade
      # in `apps/cron/src/aggregate-feedback-insights.ts` —
      # `summariseEditCluster` calls Claude Haiku to compress each
      # cluster of similar user edits into a one-sentence imperative
      # directive. Without this key, the cron still writes the
      # cluster row using the longest edit text as the placeholder,
      # so the self-learning loop is degraded-but-functional. Set
      # `sync: false` so operators can opt in by pasting the same
      # key the worker uses, without forcing a re-deploy on every
      # cron service that previously ran without it.
      - key: ANTHROPIC_API_KEY
        sync: false

  # ── MinIO object storage ───────────────────────────────────────────
  #
  # S3-compatible object storage for rendered Remotion video bytes.
  # Deployed from the official Docker image with a Render SSD Disk
  # mounted at `/data` for persistence across service restarts and
  # deploys. Daily Disk snapshots provide automatic backups.
  #
  # The workflows service's `renderRemotionVideo` task uploads
  # finished MP4 files here; the web service's
  # `/api/assets/:id/video.mp4` handler 302-redirects clients to the
  # public MinIO URL instead of streaming bytes through the web
  # instance. The bucket (`launchkit-renders`) is created programmatically
  # on the first upload via an idempotent `HeadBucket` + `CreateBucket`
  # check in `packages/asset-generators/src/clients/object-storage.ts`
  # so there is no manual setup after the service boots.
  #
  # Render routes external HTTPS traffic on port 443 to whatever port
  # the service binds to via the `PORT` env var. We bind MinIO's S3
  # API to `$PORT` (9000 by default) so the public URL
  # `https://<service-hostname>.onrender.com/<bucket>/<key>` reaches
  # the bucket directly. The admin console is intentionally NOT
  # exposed — operators run `mc` against the service's internal
  # hostname when they need to inspect buckets.
  #
  # See ADR-002 for the full decision rationale and rejected
  # alternatives (Cloudflare R2, AWS S3, instance-local cache).
  - type: web
    name: launchkit-minio
    runtime: image
    plan: pro
    # Pinned to a specific RELEASE tag rather than `:latest` so a
    # future breaking MinIO release cannot silently trash the
    # on-disk format during a routine redeploy. Bumping this is a
    # conscious operator decision, not an auto-upgrade.
    image:
      url: docker.io/minio/minio:RELEASE.2025-04-08T15-41-24Z
    dockerCommand: minio server /data --address :$PORT --console-address :9090
    autoDeploy: false
    healthCheckPath: /minio/health/live
    disk:
      name: minio-data
      mountPath: /data
      sizeGB: 10
    envVars:
      - key: MINIO_ROOT_USER
        generateValue: true
      - key: MINIO_ROOT_PASSWORD
        generateValue: true
      - key: PORT
        value: 9000

  # ── Remotion renderer ──────────────────────────────────────────────
  #
  # Docker-based web service for Remotion video compositing. Render
  # Workflows (beta) has a read-only filesystem that blocks apt-get,
  # so Chrome system libraries cannot be installed there. This
  # dedicated service runs node:22-slim with the full Chrome lib set,
  # exposes POST /render, and uploads finished MP4s to MinIO.
  #
  # The web service's `/api/assets/:id/video.mp4` handler calls this
  # service via HTTP instead of the Workflows SDK for the render step.
  # The 6 generation tasks stay on Workflows — only Chrome needs Docker.
  - type: web
    name: launchkit-renderer
    runtime: docker
    plan: pro
    dockerfilePath: ./Dockerfile.renderer
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: launchkit-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: launchkit-redis
          type: keyvalue
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: MINIO_ENDPOINT_HOST
        value: launchkit-minio.onrender.com
      - key: MINIO_ROOT_USER
        fromService:
          name: launchkit-minio
          type: web
          envVarKey: MINIO_ROOT_USER
      - key: MINIO_ROOT_PASSWORD
        fromService:
          name: launchkit-minio
          type: web
          envVarKey: MINIO_ROOT_PASSWORD
      - key: MINIO_BUCKET
        value: launchkit-renders

  - type: keyvalue
    name: launchkit-redis
    plan: pro
    maxmemoryPolicy: noeviction
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all services

databases:
  - name: launchkit-db
    plan: pro-4gb
    postgresMajorVersion: 16
