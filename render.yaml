services:
  - type: web
    name: launchkit-web
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: npm ci && npm run build
    preDeployCommand: npm run db:migrate
    startCommand: npm run start:web
    buildFilter:
      paths:
        - package.json
        - package-lock.json
        - drizzle.config.ts
        - render.yaml
        - migrations/**
        - packages/shared/**
        - packages/video/**
        - apps/web/**
        - apps/dashboard/**
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: launchkit-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: launchkit-redis
          type: keyvalue
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        sync: false
      - key: ELEVENLABS_MODEL_ID
        sync: false
      - key: API_KEY
        sync: false

  - type: worker
    name: launchkit-worker
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: npm ci && npm run build
    startCommand: npm run start:worker
    buildFilter:
      paths:
        - package.json
        - package-lock.json
        - drizzle.config.ts
        - render.yaml
        - migrations/**
        - packages/shared/**
        - packages/video/**
        - apps/worker/**
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: launchkit-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: launchkit-redis
          type: keyvalue
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-20250514
      - key: FAL_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: WEB_SEARCH_PROVIDER
        value: duckduckgo

  - type: cron
    name: launchkit-cron
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: npm ci && npm run build
    startCommand: npm run start:cron
    schedule: "0 */6 * * *"
    buildFilter:
      paths:
        - package.json
        - package-lock.json
        - drizzle.config.ts
        - render.yaml
        - migrations/**
        - packages/shared/**
        - apps/cron/**
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: launchkit-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: launchkit-redis
          type: keyvalue
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: GITHUB_TOKEN
        sync: false

  - type: keyvalue
    name: launchkit-redis
    plan: starter
    maxmemoryPolicy: noeviction

databases:
  - name: launchkit-db
    plan: starter
    postgresMajorVersion: 16
