envVarGroups:
  - name: launchkit-shared
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FAL_API_KEY
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false

services:
  - type: web
    name: launchkit-web
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start:web
    envVarGroups:
      - launchkit-shared
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: launchkit-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: launchkit-redis
          type: keyvalue
          property: connectionString
      - key: NODE_ENV
        value: production

  - type: worker
    name: launchkit-worker
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start:worker
    envVarGroups:
      - launchkit-shared
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: launchkit-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: launchkit-redis
          type: keyvalue
          property: connectionString
      - key: NODE_ENV
        value: production

  - type: cron
    name: launchkit-cron
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start:cron
    schedule: "0 */6 * * *"
    envVarGroups:
      - launchkit-shared
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: launchkit-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: launchkit-redis
          type: keyvalue
          property: connectionString
      - key: NODE_ENV
        value: production

  - type: keyvalue
    name: launchkit-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru

databases:
  - name: launchkit-db
    plan: starter
    postgresMajorVersion: 16
