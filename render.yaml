services:
  - type: web
    name: launchkit-web
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: npm ci && npm run build
    preDeployCommand: npm run db:migrate
    startCommand: npm run start:web
    buildFilter:
      paths:
        - package.json
        - package-lock.json
        - drizzle.config.ts
        - render.yaml
        - migrations/**
        - packages/shared/**
        - packages/video/**
        - apps/web/**
        - apps/dashboard/**
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: launchkit-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: launchkit-redis
          type: keyvalue
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      # Base64 32-byte secret for encrypting user-supplied GitHub
      # personal access tokens on the projects row. Must match the
      # worker's copy. See `.env.example` for the generation command.
      - key: GITHUB_TOKEN_SECRET
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        sync: false
      - key: ELEVENLABS_MODEL_ID
        sync: false
      - key: API_KEY
        sync: false
      # Render Workflows trigger — the `/api/assets/:id/regenerate`
      # route calls `render.workflows.startTask` to re-fire asset
      # generation instead of enqueuing a BullMQ job. Both fields
      # are required at call time; the web service still boots
      # without them but the regen route throws a structured error
      # if either is missing.
      - key: RENDER_API_KEY
        sync: false
      - key: RENDER_WORKFLOW_SLUG
        sync: false

  - type: worker
    name: launchkit-worker
    runtime: node
    plan: starter
    rootDir: .
    # The worker uses the Claude Agent SDK for the research agent. The
    # SDK ships a self-contained `claude` binary inside its npm package
    # (see node_modules/@anthropic-ai/claude-agent-sdk/manifest.json for
    # the per-platform checksums) — `npm ci` is enough to land it. No
    # global install or extra build step required at deploy time.
    #
    # Python is NOT installed on this dyno. The Pika video-meeting
    # integration's `join` subprocess runs on the dedicated
    # `launchkit-pika-worker` service below; this shared worker only
    # handles the pika-poll (HTTPS GET) and pika-leave (HTTPS DELETE)
    # control-plane jobs, both pure TypeScript with no Python
    # dependency.
    #
    # Note on the workflows service: Render Workflows is created via
    # the dashboard (New > Workflow) and is not defined in this
    # Blueprint. See README.md § "Create the workflow service" for
    # the one-time dashboard setup. The worker trigger helper
    # (`apps/worker/src/lib/trigger-workflow-generation.ts`) and the
    # web trigger helper (`apps/web/src/lib/trigger-workflow-generation.ts`)
    # both read `RENDER_API_KEY` and `RENDER_WORKFLOW_SLUG` from
    # their respective service env pages.
    buildCommand: npm ci && npm run build
    startCommand: npm run start:worker
    buildFilter:
      paths:
        - package.json
        - package-lock.json
        - drizzle.config.ts
        - render.yaml
        - migrations/**
        - packages/shared/**
        - packages/video/**
        - packages/asset-generators/**
        - apps/worker/**
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: launchkit-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: launchkit-redis
          type: keyvalue
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      # NOTE: this only affects the single-shot agents (writer,
      # strategist, art-director, etc.). The research agent runs
      # through the Claude Agent SDK which manages its own model
      # selection (currently hardcoded to claude-opus-4-6 in
      # apps/worker/src/lib/agent-sdk-runner.ts).
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-6
      - key: FAL_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      # World Labs (Marble) 3D world generation. Drives the
      # `world_scene` asset type — Claude drafts the prompt, the
      # worker calls Marble, polls the operation, and surfaces the
      # public viewer URL on the asset. The worker degrades gracefully
      # when the key is absent: only the world_scene branch fails,
      # the rest of the asset fan-out keeps running.
      - key: WORLD_LABS_API_KEY
        sync: false
      # Pika control-plane operations (pika-poll + pika-leave)
      # run on this shared worker and hit Pika's HTTPS endpoints
      # directly — `DELETE /session/{id}` for leave, `GET
      # /session/{id}` for the 30-second health poll. Both are
      # single-HTTP-call pure-TypeScript jobs, no Python needed.
      # The avatar ref (`PIKA_AVATAR`) is NOT set here because
      # the shared worker never spawns the join subprocess —
      # that's on the dedicated launchkit-pika-worker below.
      - key: PIKA_API_KEY
        sync: false
      # Base64 32-byte secret for decrypting the per-project GitHub
      # PAT the web service stored on the projects row. Must match
      # the web service's copy exactly; a mismatch degrades every
      # private-repo analyze job to the unauthenticated path.
      - key: GITHUB_TOKEN_SECRET
        sync: false
      # Render API key used by `trigger-workflow-generation.ts` to
      # call `render.workflows.startTask` for every asset-generation
      # run. Required — every fan-out (strategize → generate, review
      # re-queue, commit-marketing refresh) now routes through the
      # workflow service. Generated from the Render dashboard
      # account settings.
      - key: RENDER_API_KEY
        sync: false
      # Slug of the workflow service that hosts the task
      # definitions, copied from the dashboard after one-time
      # creation. Required.
      - key: RENDER_WORKFLOW_SLUG
        sync: false

  # ── Pika Invite Worker ─────────────────────────────────────────────
  #
  # Dedicated single-purpose dyno for the Pika video-meeting JOIN
  # flow. Every job on its `pika-invite` BullMQ queue spawns the
  # vendored Python CLI's `join` subcommand for ~90 seconds to bring
  # a Pika-hosted avatar into a live Google Meet. This is the ONLY
  # service in the LaunchKit stack that runs Python — the shared
  # worker above uses pure-TypeScript `fetch()` calls for the
  # control-plane operations (poll + leave).
  #
  # Why a dedicated dyno for a single queue
  # ---------------------------------------
  #
  # Reliability for the "user clicks Invite, bot joins meeting"
  # UX demands ZERO event-loop contention with the
  # analysis/research/trending jobs that run on the shared worker.
  # A dedicated dyno with a single-purpose BullMQ Worker keeps
  # click-to-subprocess-spawn latency under 100 ms regardless of
  # what other work is in flight. The dyno exists to sit warm and
  # ready to `child_process.spawn('python3', ...)` the instant a
  # job arrives on Redis.
  #
  # Both entry points (`dist/index.js` and `dist/index.pika.js`)
  # are compiled from the SAME `apps/worker` workspace — they share
  # code, not deployment. The only things different between the two
  # services are the `startCommand` and the `buildCommand` (this
  # one installs Python, the shared worker does not).
  #
  # This service consumes the `pika-invite` queue ONLY. It does
  # NOT touch analysis, review, trending, or pika-control —
  # those all live on the shared `launchkit-worker` above.
  - type: worker
    name: launchkit-pika-worker
    runtime: node
    plan: starter
    rootDir: .
    # Python 3 + `requests` install lives here, NOT on the shared
    # worker. The vendored CLI's only Python dep is `requests>=2.32.5`.
    # The `--break-system-packages` flag is required on Debian 12+
    # because the system pip refuses to install outside a virtualenv
    # by default — fine here because the Render container has no
    # competing Python environment and the install is scoped to
    # the container lifetime.
    buildCommand: apt-get update && apt-get install -y python3 python3-pip && pip3 install --break-system-packages -r vendor/pikastream-video-meeting/requirements.txt && npm ci && npm run build
    startCommand: npm run start:pika-worker
    buildFilter:
      paths:
        - package.json
        - package-lock.json
        - render.yaml
        - packages/shared/**
        - vendor/pikastream-video-meeting/**
        - apps/worker/**
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: launchkit-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: launchkit-redis
          type: keyvalue
          property: connectionString
      - key: NODE_ENV
        value: production
      # Pika Developer Key (required). The wrapper at
      # `apps/worker/src/lib/pika-stream.ts:runPikaSubprocess`
      # renames this to `PIKA_DEV_KEY` in the subprocess env at
      # spawn time so the rest of the codebase stays on our
      # standard `*_API_KEY` naming convention.
      - key: PIKA_API_KEY
        sync: false
      # Avatar reference — either an absolute container filesystem
      # path OR an https URL. For production, use a hosted URL
      # (e.g., a raw GitHub URL or an R2 public URL) since Render
      # worker containers have no stable filesystem for local
      # image files. The value is user-private and must NEVER be
      # committed to the repo. See docs/pika-integration.md §
      # "PIKA_AVATAR" for the full guidance.
      - key: PIKA_AVATAR
        sync: false

  - type: cron
    name: launchkit-cron
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: npm ci && npm run build
    startCommand: npm run start:cron
    schedule: "0 */6 * * *"
    buildFilter:
      paths:
        - package.json
        - package-lock.json
        - drizzle.config.ts
        - render.yaml
        - migrations/**
        - packages/shared/**
        - apps/cron/**
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: launchkit-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: launchkit-redis
          type: keyvalue
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: GITHUB_TOKEN
        sync: false

  - type: keyvalue
    name: launchkit-redis
    plan: starter
    maxmemoryPolicy: noeviction

databases:
  - name: launchkit-db
    plan: starter
    postgresMajorVersion: 16
