services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: launchkit
      POSTGRES_USER: launchkit
      POSTGRES_PASSWORD: launchkit
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    command: redis-server --maxmemory 100mb --maxmemory-policy noeviction

  # ── MinIO object storage ───────────────────────────────────────────
  #
  # Local S3-compatible store for rendered Remotion video bytes. The
  # workflows service uploads finished MP4 files here from its
  # `renderRemotionVideo` task; the web service reads `rendered_video_url`
  # off the asset row and 302-redirects clients straight to the public
  # URL instead of streaming bytes through the Node process. Mirrors
  # the production `launchkit-minio` service in `render.yaml` so the
  # local and deployed video paths look identical to the caller.
  #
  # The container exposes two ports:
  #   9000 — S3 API (same port every AWS SDK client targets by default)
  #   9001 — web console (http://localhost:9001 to inspect buckets)
  #
  # The named `miniodata` volume persists objects across container
  # restarts so rendered videos survive `docker compose down` / `up`
  # cycles. `docker compose down -v` wipes the volume — destructive;
  # only use it when you intentionally want a clean slate.
  #
  # The bucket is created programmatically on the first upload via
  # the `HeadBucket` + `CreateBucket` idempotent check in
  # `packages/asset-generators/src/clients/object-storage.ts`. No
  # manual setup after the container boots. See ADR-002 for the full
  # decision rationale.
  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: launchkit
      MINIO_ROOT_PASSWORD: launchkit-dev-password
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
  miniodata:
